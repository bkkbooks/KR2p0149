body:
  text: 第三章君子居則貴左用兵則貴右故曰兵者不祥之器也不得已而用之銛襲為上弗美也美之是樂殺人夫樂殺人不可以得志於天下故吉事上左喪事上右是以偏將軍居左上將軍居右言以喪禮居之也故殺人衆則以哀悲涖之戰勝則以喪禮居之
